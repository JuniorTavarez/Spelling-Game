<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Scramble & Test!</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; text-align: center;
      background-color: #e0f7fa; margin: 0; padding: 20px;
    }
    .game-container {
      background-color: white; max-width: 550px; margin: 20px auto; padding: 30px;
      border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border: 4px solid #4dd0e1;
      position: relative;
    }
    h1 { color: #00838f; font-size: 32px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;}
    .progress-text { color: #888; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
    
    /* --- START SCREEN --- */
    #startScreen { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .mode-btn {
      color: white; font-size: 18px; font-weight: bold; padding: 15px; 
      border: none; border-radius: 12px; cursor: pointer; transition: 0.1s;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .memory-btn { background-color: #ff5722; box-shadow: 0 5px 0 #e64a19; }
    .study-btn { background-color: #9c27b0; box-shadow: 0 5px 0 #7b1fa2; }
    .easy-btn { background-color: #4caf50; box-shadow: 0 5px 0 #388e3c; }
    .normal-btn { background-color: #29b6f6; box-shadow: 0 5px 0 #0288d1; }
    .hard-btn { background-color: #ef5350; box-shadow: 0 5px 0 #c62828; }
    .test-btn { background-color: #ffb300; box-shadow: 0 5px 0 #f57c00; color: #000; }
    .mode-btn:active { transform: translateY(5px); box-shadow: none; }

    /* --- GAME / TEST UI --- */
    #mainUI { display: none; }
    .audio-controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    
    .action-btn {
      background-color: #29b6f6; color: white; font-size: 18px; font-weight: bold;
      padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 4px 0 #0288d1; transition: 0.1s;
    }
    .action-btn.sentence-btn { background-color: #ab47bc; box-shadow: 0 4px 0 #7b1fa2; }
    .action-btn:active { transform: translateY(4px); box-shadow: none; }
    
    .skip-btn {
      background-color: #ff9800; color: white; font-size: 16px; font-weight: bold;
      padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 4px 0 #f57c00; transition: 0.1s; margin: 10px auto; display: none;
    }
    .skip-btn:active { transform: translateY(4px); box-shadow: none; }
    
    #answerBox {
      font-size: 36px; letter-spacing: 5px; min-height: 50px; margin: 20px 0;
      padding: 10px; border-bottom: 4px dashed #ccc; color: #333; font-weight: bold;
    }
    
    .letter-btn {
      background-color: #29b6f6; color: white; font-size: 28px; font-weight: bold;
      width: 60px; height: 60px; margin: 5px; border: none; border-radius: 10px;
      cursor: pointer; box-shadow: 0 4px 0 #0288d1; text-transform: uppercase;
    }
    .letter-btn:active { transform: translateY(4px); box-shadow: none; }
    .letter-btn:disabled { background-color: #e0e0e0; box-shadow: none; cursor: not-allowed; color: #9e9e9e;}
    
    #lettersContainer { margin-bottom: 20px; }

    /* --- FLASHCARD / MULTIPLE CHOICE UI --- */
    #mcContainer { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .mc-btn {
      background-color: #fff; color: #333; font-size: 26px; font-weight: bold;
      padding: 20px; border: 3px solid #03dac6; border-radius: 15px; cursor: pointer;
      box-shadow: 0 5px 0 #018786; text-transform: lowercase; transition: 0.1s;
    }
    .mc-btn:active { transform: translateY(5px); box-shadow: none; }
    #countdownTimer { font-size: 60px; font-weight: bold; color: #ff5722; margin: 5px 0 15px 0; display: none; }
    #studyMessage { font-size: 20px; color: #9c27b0; font-weight: bold; display: none; margin-bottom: 15px;}

    /* TEST MODE INPUT */
    #testInputContainer { display: none; margin-bottom: 20px; }
    .test-input {
      width: 80%; font-size: 32px; text-align: center; border: none;
      border-bottom: 4px solid #333; padding: 10px; margin-bottom: 20px;
      font-family: inherit; font-weight: bold; color: #333; background: transparent;
      outline: none; letter-spacing: 2px; text-transform: lowercase;
    }
    .submit-btn {
      background-color: #4caf50; color: white; font-size: 20px; font-weight: bold;
      padding: 15px 30px; border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 4px 0 #388e3c; width: 80%;
    }
    .submit-btn:active { transform: translateY(4px); box-shadow: none; }

    #feedback { font-size: 24px; font-weight: bold; height: 35px; margin-top: 15px; }
    
    .dashboard { display: flex; justify-content: space-between; align-items: center; background-color: #f1f8e9; padding: 15px; border-radius: 15px; margin-top: 20px; border: 2px solid #c5e1a5; }
    .score-text { font-size: 20px; color: #333; font-weight: bold; }
    
    .hint-btn { background-color: #9c27b0; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #6a1b9a; }
    .hint-btn:active { transform: translateY(3px); box-shadow: none; }
    .reset-btn { background-color: #ef5350; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 10px; font-weight: bold; }

    #practiceReport { display: none; background-color: #fff3e0; border: 3px dashed #ffb300; border-radius: 15px; padding: 20px; margin-top: 25px; }
    #practiceReport h3 { color: #e65100; margin-top: 0; font-size: 22px; }
    #missedWordsList { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
    #chatStatus { font-size: 14px; color: #4caf50; font-weight: bold; display: none; }
  </style>
</head>
<body>

  <audio id="failSound" src="https://www.myinstants.com/media/sounds/error_CDpnjrn.mp3" preload="auto"></audio>
  <audio id="yaySound" src="https://www.myinstants.com/media/sounds/kids_cheering.mp3" preload="auto"></audio>

  <div class="game-container">
    <h1 id="mainTitle">⚡ Training Camp ⚡</h1>
    
    <div id="startScreen">
      <p style="color: #666; margin-top: 0;">Choose your challenge level:</p>
      <button class="mode-btn memory-btn" onclick="startApp('memory')">🕵️‍♂️ Secret Agent (Flashcards)</button>
      <button class="mode-btn study-btn" onclick="startApp('study')">🧙‍♂️ Wizard Academy (Study & Quiz)</button>
      <button class="mode-btn easy-btn" onclick="startApp('easy')">🥷 Ninja Training (Scramble - Easy)</button>
      <button class="mode-btn normal-btn" onclick="startApp('normal')">🦸‍♂️ Hero Mission (Scramble - Normal)</button>
      <button class="mode-btn hard-btn" onclick="startApp('hard')">🥊 Heavyweight (Scramble - Hard)</button>
      <button class="mode-btn test-btn" onclick="startApp('test')">🏆 The Boss Fight (Typing Test)</button>
    </div>

    <div id="mainUI">
      <div class="progress-text" id="progressText">Word 1 of ?</div>
      
      <div id="studyMessage">Listen and Learn! 🧠</div>

      <div class="audio-controls" id="audioControls">
        <button class="action-btn" onclick="speakWord()">🔊 Hear Word</button>
        <button class="action-btn sentence-btn" onclick="speakSentence()">💬 Hear Sentence</button>
      </div>
      
      <div id="countdownTimer">5</div>
      <button id="skipTimerBtn" class="skip-btn" onclick="endMemoryTimer()">⏭️ Skip Timer</button>
      
      <div id="answerBox"></div>
      
      <div id="mcContainer"></div>

      <div id="lettersContainer"></div>
      <button class="reset-btn" id="resetBtn" onclick="resetCurrentWord()">🔄 Oops! Clear Letters</button>

      <div id="testInputContainer">
        <input type="text" id="testInput" class="test-input" placeholder="Type word here..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <br>
        <button class="submit-btn" onclick="submitTestAnswer()">Submit Answer ➡️</button>
      </div>

      <div id="feedback"></div>
      
      <div class="dashboard" id="gameDashboard">
        <div class="score-text">Stars: ⭐ <span id="score">0</span></div>
        <button class="hint-btn" id="hintBtn" onclick="buyHint()">💡 Buy Hint (-1 ⭐)</button>
      </div>

      <div id="practiceReport">
        <h3 id="reportTitle">🎯 Needs Practice:</h3>
        <p id="missedWordsList"></p>
        <div id="chatStatus">💬 Report sent to Google Chat!</div>
      </div>
    </div>
  </div>

  <script>
    // 👇 HIS NEW WEEKLY SPELLING WORDS 👇
    const originalWordList = [
      { word: "blue", sentence: "The sky is very blue today." },
      { word: "red", sentence: "The stop sign is painted red." },
      { word: "yellow", sentence: "The sun is bright and yellow." },
      { word: "orange", sentence: "I ate a juicy orange for breakfast." },
      { word: "pink", sentence: "The pig at the farm was pink." },
      { word: "purple", sentence: "She wore a pretty purple dress." },
      { word: "green", sentence: "The grass in the yard is green." },
      { word: "black", sentence: "The cat hiding in the shadows is black." },
      { word: "white", sentence: "The fluffy clouds are white." },
      { word: "brown", sentence: "The bear in the woods is brown." }
    ];
    
    let wordList = [];
    let currentWordIndex = 0;
    let score = 0;
    let currentAnswer = "";
    let correctWord = "";
    let missedWords = new Set(); 
    let activeMode = "";
    
    let isStudyPhase = false;
    let timerInterval;

    function startApp(mode) {
      activeMode = mode;
      wordList = [...originalWordList].sort(() => Math.random() - 0.5);

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("mainUI").style.display = "block";
      
      // HIDE "Clear Letters" button for modes that don't need it
      if(activeMode === "memory" || activeMode === "study" || activeMode === "test") {
          document.getElementById("resetBtn").style.display = "none";
      } else {
          document.getElementById("resetBtn").style.display = "inline-block";
      }

      if (activeMode === "study") {
        document.getElementById("mainTitle").innerText = "🧙‍♂️ Wizard Academy 🧙‍♂️";
        isStudyPhase = true;
      }
      if (activeMode === "memory") document.getElementById("mainTitle").innerText = "🕵️‍♂️ Secret Agent Memory 🕵️‍♂️";
      if (activeMode === "easy") document.getElementById("mainTitle").innerText = "🥷 Ninja Training 🥷";
      if (activeMode === "normal") document.getElementById("mainTitle").innerText = "🦸‍♂️ Hero Mission 🦸‍♂️";
      if (activeMode === "hard") document.getElementById("mainTitle").innerText = "🥊 Heavyweight Match 🥊";

      if (activeMode === "test") {
        document.getElementById("mainTitle").innerText = "🏆 The Boss Fight 🏆";
        document.getElementById("answerBox").style.display = "none";
        document.getElementById("lettersContainer").style.display = "none";
        document.getElementById("gameDashboard").style.display = "none";
        document.getElementById("testInputContainer").style.display = "block";
      }

      loadNextWord();
    }

    function generateTrickWords(correct) {
      let options = new Set();
      options.add(correct);
      const alphabet = "abcdefghijklmnopqrstuvwxyz";
      
      while (options.size < 4) {
        let arr = correct.split('');
        let rand = Math.random();
        
        if (arr.length > 2 && rand < 0.33) {
          let idx = Math.floor(Math.random() * (arr.length - 1));
          let temp = arr[idx]; arr[idx] = arr[idx+1]; arr[idx+1] = temp;
          options.add(arr.join(''));
        } else if (rand < 0.66) {
          let idx = Math.floor(Math.random() * arr.length);
          arr[idx] = arr[idx] + arr[idx];
          options.add(arr.join(''));
        } else {
          let idx = Math.floor(Math.random() * arr.length);
          arr[idx] = alphabet[Math.floor(Math.random() * alphabet.length)];
          options.add(arr.join(''));
        }
      }
      return Array.from(options).sort(() => Math.random() - 0.5);
    }

    function speakWord() {
      if (currentWordIndex < wordList.length) {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(wordList[currentWordIndex].word));
      }
    }

    function speakSentence() {
      if (currentWordIndex < wordList.length) {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(wordList[currentWordIndex].sentence));
      }
    }

    // 🔥 THE NEW AUDIO SEQUENCE FOR WIZARD ACADEMY 🔥
    function playStudyAudioSequence() {
      // 1. Read Word
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(correctWord));
      
      // 2. Spell out the word
      let spelledOut = correctWord.split('').join(', ');
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(spelledOut));
      
      // 3. Read the sentence
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(wordList[currentWordIndex].sentence));
      
      // 4. Read Word Again (and then move to next)
      let finalWord = new SpeechSynthesisUtterance(correctWord);
      finalWord.onend = function() {
        setTimeout(() => {
          currentWordIndex++;
          loadNextWord();
        }, 1500);
      };
      window.speechSynthesis.speak(finalWord);
    }

    // Helper to stop the flashcard timer early
    function endMemoryTimer() {
        clearInterval(timerInterval);
        document.getElementById("countdownTimer").style.display = "none";
        document.getElementById("skipTimerBtn").style.display = "none";
        document.getElementById("answerBox").style.display = "none";
        document.getElementById("audioControls").style.display = "flex";
        showMultipleChoice();
    }

    function loadNextWord() {
      if (currentWordIndex >= wordList.length) {
        if (activeMode === "study" && isStudyPhase) {
          isStudyPhase = false;
          currentWordIndex = 0;
          wordList = [...originalWordList].sort(() => Math.random() - 0.5); 
          
          // Removed the popup alert, seamlessly transitions text instead!
          document.getElementById("studyMessage").innerText = "Quiz Time! Select the correct spelling. 🧠";
          loadNextWord(); 
          return;
        }
        endSession();
        return;
      }

      document.getElementById("progressText").innerText = `Word ${currentWordIndex + 1} of ${wordList.length}`;
      correctWord = wordList[currentWordIndex].word.toLowerCase();
      document.getElementById("feedback").innerText = "";
      
      // --- STUDY MODE (PHASE 1) ---
      if (activeMode === "study" && isStudyPhase) {
        document.getElementById("studyMessage").style.display = "block";
        document.getElementById("answerBox").style.display = "block";
        document.getElementById("answerBox").innerText = correctWord.toUpperCase();
        document.getElementById("audioControls").style.display = "none";
        document.getElementById("gameDashboard").style.display = "none";
        
        playStudyAudioSequence();
      } 
      
      // --- STUDY MODE (PHASE 2) OR MEMORY MODE ---
      else if ((activeMode === "study" && !isStudyPhase) || activeMode === "memory") {
        document.getElementById("audioControls").style.display = "flex";
        document.getElementById("gameDashboard").style.display = "none"; 
        document.getElementById("mcContainer").style.display = "none";
        document.getElementById("answerBox").style.display = "block";
        
        if (activeMode === "memory") {
          document.getElementById("answerBox").innerText = correctWord.toUpperCase();
          document.getElementById("countdownTimer").style.display = "block";
          document.getElementById("skipTimerBtn").style.display = "block"; // Show skip button
          document.getElementById("audioControls").style.display = "none"; 
          speakWord(); 
          
          let timeLeft = 5;
          document.getElementById("countdownTimer").innerText = timeLeft;
          
          timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById("countdownTimer").innerText = timeLeft;
            if (timeLeft <= 0) {
              endMemoryTimer();
            }
          }, 1000);
        } else {
          document.getElementById("answerBox").style.display = "none";
          speakWord();
          showMultipleChoice();
        }
      }

      // --- SCRAMBLE MODES (Easy, Normal, Hard) ---
      else if (activeMode === "easy" || activeMode === "normal" || activeMode === "hard") {
        currentAnswer = "";
        document.getElementById("answerBox").innerText = "";
        document.getElementById("gameDashboard").style.display = "flex";
        
        let letters = correctWord.split("");
        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        
        let decoyCount = 0;
        if (activeMode === "normal") decoyCount = 2; 
        if (activeMode === "hard") decoyCount = 5;   
        
        for (let i = 0; i < decoyCount; i++) {
          letters.push(alphabet[Math.floor(Math.random() * alphabet.length)]);
        }

        for (let i = letters.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [letters[i], letters[j]] = [letters[j], letters[i]];
        }

        const container = document.getElementById("lettersContainer");
        container.innerHTML = ""; 
        letters.forEach((letter, index) => {
          let btn = document.createElement("button");
          btn.innerText = letter;
          btn.className = "letter-btn";
          btn.id = "btn-" + index;
          btn.onclick = function() { addLetter(letter, btn.id); };
          container.appendChild(btn);
        });

      } 
      
      // --- TEST MODE ---
      else if (activeMode === "test") {
        const inputField = document.getElementById("testInput");
        inputField.value = "";
        inputField.focus();
        setTimeout(speakWord, 500); 
      }
    }

    function showMultipleChoice() {
      const container = document.getElementById("mcContainer");
      container.innerHTML = "";
      container.style.display = "grid";
      
      let options = generateTrickWords(correctWord);
      
      options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "mc-btn";
        btn.onclick = function() { checkMultipleChoice(opt); };
        container.appendChild(btn);
      });
    }

    function checkMultipleChoice(selectedWord) {
      document.getElementById("mcContainer").style.display = "none";
      const feedback = document.getElementById("feedback");

      if (selectedWord === correctWord) {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Good job!"));
        feedback.innerText = "🎉 PERFECT! 🎉";
        feedback.style.color = "#4caf50";
        score++;
        document.getElementById("score").innerText = score;
        currentWordIndex++;
        setTimeout(loadNextWord, 1500);
      } else {
        try { document.getElementById("failSound").currentTime = 0; document.getElementById("failSound").play(); } catch(e) {}
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Uh oh!"));
        feedback.innerText = "Oops! Back of the line! 🔄";
        feedback.style.color = "#f44336";
        
        missedWords.add(correctWord);
        wordList.push(wordList[currentWordIndex]); 
        
        currentWordIndex++;
        setTimeout(loadNextWord, 1500);
      }
    }

    function addLetter(letter, buttonId) {
      currentAnswer += letter;
      document.getElementById("answerBox").innerText = currentAnswer.toUpperCase();
      document.getElementById(buttonId).disabled = true;

      if (currentAnswer.length === correctWord.length) {
        checkSpellingGame();
      }
    }

    function checkSpellingGame() {
      const feedback = document.getElementById("feedback");
      if (currentAnswer === correctWord) {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Good job!"));
        feedback.innerText = "🎉 PERFECT! 🎉";
        feedback.style.color = "#4caf50";
        score++;
        document.getElementById("score").innerText = score;
        currentWordIndex++;
        setTimeout(loadNextWord, 1500);
      } else {
        try { document.getElementById("failSound").currentTime = 0; document.getElementById("failSound").play(); } catch(e) {}
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Uh oh!"));

        feedback.innerText = "Oops! Back of the line! 🔄";
        feedback.style.color = "#f44336";
        
        missedWords.add(correctWord);
        wordList.push(wordList[currentWordIndex]); 
        
        currentWordIndex++;
        setTimeout(loadNextWord, 1500);
      }
    }

    function resetCurrentWord() {
      currentAnswer = "";
      document.getElementById("answerBox").innerText = "";
      document.getElementById("feedback").innerText = "";
      const buttons = document.getElementsByClassName("letter-btn");
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].disabled = false;
      }
    }

    function buyHint() {
      if (score < 1) { alert("You need 1 Star ⭐ to buy a hint!"); return; }
      const nextCorrectLetter = correctWord[currentAnswer.length];
      if (!nextCorrectLetter) return;
      const buttons = document.getElementsByClassName("letter-btn");
      for (let i = 0; i < buttons.length; i++) {
        if (buttons[i].innerText.toLowerCase() === nextCorrectLetter.toLowerCase() && !buttons[i].disabled) {
          score--; document.getElementById("score").innerText = score;
          buttons[i].click();
          document.getElementById("feedback").innerText = "💡 Hint Used!";
          document.getElementById("feedback").style.color = "#9c27b0";
          break; 
        }
      }
    }

    function submitTestAnswer() {
      const guess = document.getElementById("testInput").value.toLowerCase().trim();
      if (guess === "") return; 

      if (guess === correctWord) {
        score++;
      } else {
        missedWords.add(correctWord);
      }
      currentWordIndex++;
      loadNextWord();
    }

    function endSession() {
      document.getElementById("lettersContainer").style.display = "none";
      document.getElementById("mcContainer").style.display = "none";
      document.getElementById("answerBox").style.display = "none";
      document.getElementById("testInputContainer").style.display = "none";
      document.getElementById("audioControls").style.display = "none";
      document.getElementById("resetBtn").style.display = "none";
      document.getElementById("gameDashboard").style.display = "none";
      document.getElementById("progressText").innerText = "All done!";
      
      // Also hide the skip button just in case
      document.getElementById("skipTimerBtn").style.display = "none";
      document.getElementById("countdownTimer").style.display = "none";

      const totalWords = originalWordList.length;
      const percentage = Math.round((score / totalWords) * 100); 

      const feedbackEl = document.getElementById("feedback");
      const reportTitle = document.getElementById("reportTitle");

      if (activeMode === "test") {
        if (percentage >= 80) {
          feedbackEl.innerText = `🏆 YOU PASSED! (${percentage}%) 🏆`;
          feedbackEl.style.color = "#4caf50";
          try { document.getElementById("yaySound").play(); } catch(e) {}
          confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
        } else {
          feedbackEl.innerText = `Score: ${percentage}%\n💪 Keep practicing! Mistakes help your brain grow. 💪`;
          feedbackEl.style.color = "#ff9800";
          reportTitle.innerText = "📚 Let's review these together:";
        }
      } else {
        feedbackEl.innerText = "🏆 YOU WON! 🏆";
        feedbackEl.style.color = "#4caf50";
        try { document.getElementById("yaySound").play(); } catch(e) {}
        confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
      }

      document.getElementById("practiceReport").style.display = "block";
      let missedText = missedWords.size > 0 ? Array.from(missedWords).join(", ") : "None! A perfect score! 🌟";
      document.getElementById("missedWordsList").innerText = missedText;

      const chatWebhookURL = "https://chat.googleapis.com/v1/spaces/AAQA6stRJYk/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=2B8KzPKO4GYs6rzZcwBFbmCJaWTNds5zqIMHJhdRG1g";
      
      let niceModeName = "Game";
      if(activeMode === "easy") niceModeName = "Ninja Training (Easy)";
      if(activeMode === "normal") niceModeName = "Hero Mission (Normal)";
      if(activeMode === "hard") niceModeName = "Heavyweight Match (Hard)";
      if(activeMode === "memory") niceModeName = "Secret Agent Memory (Flashcards)";
      if(activeMode === "study") niceModeName = "Wizard Academy (Study & Quiz)";
      if(activeMode === "test") niceModeName = "Boss Fight (Test)";

      const finalMsg = missedWords.size > 0 
        ? `🎯 *Spelling Update: ${niceModeName}*\nScore: ${percentage}%\n\nWords he needs to practice:\n${missedText}`
        : `🌟 *Spelling Update: ${niceModeName}*\n\nPerfect score (${percentage}%)! No words missed.`;

      fetch(chatWebhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=UTF-8" },
        body: JSON.stringify({ text: finalMsg })
      })
      .then(() => { document.getElementById("chatStatus").style.display = "block"; })
      .catch(err => console.log(err));
    }
  </script>
</body>
</html>
