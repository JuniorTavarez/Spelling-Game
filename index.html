<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Scramble!</title>
  <style>
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      text-align: center;
      background-color: #e0f7fa;
      margin: 0;
      padding: 20px;
    }
    .game-container {
      background-color: white;
      max-width: 500px;
      margin: 20px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      border: 4px solid #4dd0e1;
    }
    h1 { color: #00838f; font-size: 28px; }
    
    .action-btn {
      background-color: #ffb300;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 15px 30px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 20px;
      box-shadow: 0 4px 0 #ff8f00;
    }
    .action-btn:active { transform: translateY(4px); box-shadow: none; }
    
    #answerBox {
      font-size: 36px;
      letter-spacing: 5px;
      min-height: 50px;
      margin: 20px 0;
      padding: 10px;
      border-bottom: 4px dashed #ccc;
      color: #333;
      font-weight: bold;
    }
    
    .letter-btn {
      background-color: #29b6f6;
      color: white;
      font-size: 28px;
      font-weight: bold;
      width: 60px;
      height: 60px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0288d1;
      text-transform: uppercase;
    }
    .letter-btn:active { transform: translateY(4px); box-shadow: none; }
    .letter-btn:disabled { background-color: #e0e0e0; box-shadow: none; cursor: not-allowed; color: #9e9e9e;}
    
    #lettersContainer { margin-bottom: 20px; }
    #feedback { font-size: 24px; font-weight: bold; height: 35px; margin-top: 15px; }
    .score-text { font-size: 18px; color: #555; margin-top: 20px; }
    
    .reset-btn {
      background-color: #ef5350;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>🧩 Spelling Puzzle 🧩</h1>
    
    <button class="action-btn" onclick="speakWord()">🔊 Hear Word</button>
    
    <div id="answerBox"></div>
    
    <div id="lettersContainer"></div>
    
    <button class="reset-btn" onclick="resetCurrentWord()">🔄 Oops! Start Word Over</button>

    <div id="feedback"></div>
    <div class="score-text">Stars: ⭐ <span id="score">0</span></div>
  </div>

  <script>
    // 👇 PUT HIS WEEKLY SPELLING WORDS HERE 👇
    const wordList = ["were", "who", "good", "come", "does", "into", "very", "more", "other", "people"];
    
    let currentWordIndex = 0;
    let score = 0;
    let currentAnswer = "";
    let correctWord = "";

    // Starts the game when the page loads
    window.onload = loadNextWord;

    function speakWord() {
      if (currentWordIndex < wordList.length) {
        let msg = new SpeechSynthesisUtterance(wordList[currentWordIndex]);
        window.speechSynthesis.speak(msg);
      }
    }

    function loadNextWord() {
      if (currentWordIndex >= wordList.length) {
        document.getElementById("lettersContainer").innerHTML = "";
        document.getElementById("answerBox").innerText = "🏆 You won!";
        document.getElementById("feedback").innerText = "Awesome job today!";
        return;
      }

      correctWord = wordList[currentWordIndex].toLowerCase();
      currentAnswer = "";
      document.getElementById("answerBox").innerText = "";
      document.getElementById("feedback").innerText = "";
      
      // Create a scrambled array of the letters
      let letters = correctWord.split("");
      // Shuffle the letters
      for (let i = letters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [letters[i], letters[j]] = [letters[j], letters[i]];
      }

      // Create the buttons for the scrambled letters
      const container = document.getElementById("lettersContainer");
      container.innerHTML = ""; 
      
      letters.forEach((letter, index) => {
        let btn = document.createElement("button");
        btn.innerText = letter;
        btn.className = "letter-btn";
        btn.id = "btn-" + index;
        btn.onclick = function() { addLetter(letter, btn.id); };
        container.appendChild(btn);
      });
    }

    function addLetter(letter, buttonId) {
      // Add letter to the answer box
      currentAnswer += letter;
      document.getElementById("answerBox").innerText = currentAnswer.toUpperCase();
      
      // Disable the button so he can't click it twice
      document.getElementById(buttonId).disabled = true;

      // Check if he finished the word
      if (currentAnswer.length === correctWord.length) {
        checkSpelling();
      }
    }

    function checkSpelling() {
      const feedback = document.getElementById("feedback");
      if (currentAnswer === correctWord) {
        feedback.innerText = "🎉 PERFECT! 🎉";
        feedback.style.color = "#4caf50";
        score++;
        document.getElementById("score").innerText = score;
        currentWordIndex++;
        
        // Wait 2 seconds, then load the next word automatically
        setTimeout(loadNextWord, 2000);
      } else {
        feedback.innerText = "Hmm, not quite! Try again.";
        feedback.style.color = "#f44336";
        // Give him a second to see the mistake, then reset the word
        setTimeout(resetCurrentWord, 1500);
      }
    }

    function resetCurrentWord() {
      // Clears the answer and re-enables all the letter buttons
      currentAnswer = "";
      document.getElementById("answerBox").innerText = "";
      document.getElementById("feedback").innerText = "";
      
      const buttons = document.getElementsByClassName("letter-btn");
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].disabled = false;
      }
    }
  </script>
</body>
</html>
